kind = "web"
previewPath = "/"
title = "Work Order Management System"
version = "1.0.0"
id = "artifacts/work-order-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21921
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/work-order-system run dev"

[services.env]
PORT = "21921"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/work-order-system", "run", "build"]
publicDir = "artifacts/work-order-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
